<!doctype html>
<html lang="en">
	<head>
		<!-- Required meta tags -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<!-- Bootstrap CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

		<title>contact me</title>
	</head>
	<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
	<div class="container-fluid">
		<a class="navbar-brand" href="#">Developer Dev</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="navbarSupportedContent">
			<ul class="navbar-nav me-auto mb-2 mb-lg-0">
				<li class="nav-item">
					<a class="nav-link" aria-current="page" href="/">Home</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" href="/about">About</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" href="/projects">Projects</a>
				</li>
				<li class="nav-item">
					<a class="nav-link active" href="/contacts">Contact me</a>
				</li>
			</ul>
			<form class="d-flex" role="search">
				<input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
				<button class="btn btn-outline-success" type="submit">Search</button>
			</form>
		</div>
	</div>
</nav>
		
<div class="container my-4">
	<h2 class="text-center">Contact me</h2>
	<form action="/contacts" method="post">
		{% csrf_token %}
	<div class="mb-3"> 
	<label for="Name" class="form-label">Name</label>
	<input type="text" class="form-control" id="Name" name="name" placeholder="Your name">
	</div>
	<div class="mb-3 ">
	<label for="Email" class="form-label">Email address</label>
	<input type="email" class="form-control" id="Email" name="email" placeholder="name@example.com">
	</div>
	<div class="mb-3">
	<label for="Phone" class="form-label">Phone number</label>
	<input type="phone" class="form-control" id="Phone" name="phone" placeholder="Your phone number">
	</div>

	<div class="mb-3">
	<label for="exampleFormControlTextarea1" class="form-label">Tell me</label>
	<textarea class="form-control" id="exampleFormControlTextarea1" name="description" rows="5"></textarea>
	</div>
<button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
</body>
</html>
